node_id: "slave-01"
# 改成你的 master 地址(host:port)。这是占位值,不要直接使用。
master_addr: "master.example:9000"
token: "replace-with-strong-token"
tags:
  - "web"
state_file: "data/slave-state.json"
# 留空则不暴露 /metrics;建议仅绑回环,例如 "127.0.0.1:9101"
metrics_listen_addr: ""
reconnect_interval: "5s"
dry_run: true
tls:
  enabled: false
  disabled: false
  cert_file: ""
  key_file: ""
  ca_file: ""
  server_name: ""
  insecure_skip_verify: false
shutdown_command:
  - "/usr/bin/sudo"
  - "-n"
  - "/sbin/shutdown"
  - "-h"
  - "now"
