listen_addr: ":9000"
# admin_listen_addr 同时承载状态页、admin API 和 /metrics(/metrics 不鉴权,仅靠绑定回环保护)
admin_listen_addr: "127.0.0.1:9001"
admin_token: "replace-with-strong-admin-token"
# public_addr: slave 从 /install/slave 收到的 master_addr。留空时回退到请求的 Host header + listen_addr 端口。
public_addr: ""
# install_repo: /install/slave 用来拉取 install-online.sh 的 GitHub 仓库。留空使用默认上游。
install_repo: ""
state_file: "data/master-state.json"
auth_tokens:
  - "replace-with-strong-token"
poll_interval: "10s"
command_timeout: "30s"
offline_after: "45s"
dry_run: true
log_ups_status: false
tls:
  enabled: false
  disabled: false
  cert_file: ""
  key_file: ""
  ca_file: ""
  require_client_cert: false
shutdown_policy:
  require_on_battery: true
  min_battery_charge: 30
  min_runtime_minutes: 15
  shutdown_reason: "UPS battery threshold reached"
# shutdown_policies: 多策略组合。任一 policy 命中即触发;命中多条时 target 取并集
# (任一 all:true 则关全部;否则 tags / node_ids 并集)。reason 拼接成 'a; b'。
# 留空时自动用上面的 shutdown_policy 合成一条 'default' policy,旧配置无需改动。
# shutdown_policies:
#   - name: dev-early
#     when:
#       charge_below: 50
#     target:
#       tags: [dev]
#     reason: "dev nodes shed early"
#   - name: critical-all
#     when:
#       on_battery: true
#       runtime_below: 5
#     target:
#       all: true
#     reason: "runtime critical"
local_shutdown:
  enabled: false
  command:
    - "/sbin/shutdown"
    - "-h"
    - "now"
  max_wait: "15m"
  emergency_runtime_minutes: 15
snmp:
  target: "192.168.1.10"
  port: 161
  community: "public"
  version: "2c"
  timeout_seconds: 2
  output_source_oid: ".1.3.6.1.2.1.33.1.4.1.0"
  charge_oid: ".1.3.6.1.2.1.33.1.2.4.0"
  runtime_minutes_oid: ".1.3.6.1.2.1.33.1.2.3.0"
