name: build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.23.x"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build project
        run: go build ./...

      - name: Unit tests
        run: go test -race ./...

      - name: Protocol fuzz smoke
        run: go test -run '^$' -fuzz=FuzzReadEnvelope -fuzztime=30s ./internal/protocol/

      - name: E2E tests
        run: go test -race -tags e2e -count=1 ./internal/e2e/...

      - name: Build Linux artifacts
        run: ./scripts/build-linux.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nut-server-build-artifacts
          path: |
            dist/linux-amd64
            dist/linux-arm64
