name: build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22.x"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build project
        run: go build ./...

      - name: Build Linux artifacts
        run: ./scripts/build-linux.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nut-server-build-artifacts
          path: |
            dist/linux-amd64
            dist/linux-arm64
