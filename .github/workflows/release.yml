name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Build release archives
        run: VERSION=${{ github.ref_name }} ./scripts/package-release.sh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            See the release notes below for details about this version and the packaged artifacts.
          body_path: .github/release-notes/${{ github.ref_name }}.md
          generate_release_notes: true
          files: |
            dist/release/*.tar.gz
