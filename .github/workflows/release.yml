name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22.x'

      - name: Install nfpm
        run: |
          curl -fsSL https://github.com/goreleaser/nfpm/releases/download/v2.41.3/nfpm_2.41.3_amd64.deb -o /tmp/nfpm.deb
          sudo dpkg -i /tmp/nfpm.deb

      - name: Build release artifacts
        run: VERSION=${{ github.ref_name }} ./scripts/package-release.sh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            See the release notes below for details about this version and the packaged artifacts.
          body_path: .github/release-notes/${{ github.ref_name }}.md
          generate_release_notes: true
          files: |
            dist/release/*.tar.gz
            dist/release/*.deb
            dist/release/*.rpm
            dist/release/SHA256SUMS
