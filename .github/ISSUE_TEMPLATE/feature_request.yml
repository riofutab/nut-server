name: Feature request
description: 提议一个新功能或改进
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        谢谢提议! 在开始之前, 先看下:
        - [Roadmap](../blob/master/README.md#路线图) 是否已经在计划里
        - 是否已经有相似 issue (搜索 `[feat]` label)

  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题?
      description: 描述当前痛点, 而不是直接跳到方案
      placeholder: |
        当前 master 没法基于 UPS 负载比例触发关机, 只能看电量百分比和剩余时间。
        在多 UPS 共享负载的场景里这两个指标不够准。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 你期望的方案
      description: 不一定要完整设计, 但要让 reviewer 理解你想要的形状
      placeholder: |
        在 shutdown_policies.when 里加 load_above: <int> 字段, master 通过额外的 SNMP OID 拉负载百分比, 用同样的 AND / OR 语义参与触发。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 如果有的话 — 帮 reviewer 理解你为什么选了上面那条
      placeholder: |
        - 外挂脚本 + /commands/shutdown 主动调用: 可以做但增加外部依赖, 不在 master 进程内
        - 用 cron 周期检查: 时效性差
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: 期望的工作量
      description: 你的预估, 帮助 triage
      options:
        - "Small (一天内, 单文件改动)"
        - "Medium (1-3 天, 跨模块)"
        - "Large (>3 天 / 需要设计讨论)"
        - "不确定"
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: 你愿意贡献吗?
      options:
        - label: 我愿意自己开 PR 实现 (review 后)
        - label: 我可以帮测试 / review, 但不写实现
        - label: 仅提议, 等 maintainer 接手
